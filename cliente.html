<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fretex — Cliente</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/cliente.css" />
</head>
<body>

  <header class="app-header" id="appHeader"></header>

  <main class="main-container" id="mainContent">
    <div class="flex-center" style="height:60vh">
      <div class="spinner-lg"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="#" class="active" data-view="pedidos" onclick="trocarView('pedidos',this);return false;">
      <span class="nav-icon">📦</span>Meus Fretes
    </a>
    <a href="#" data-view="novo" onclick="trocarView('novo',this);return false;">
      <span class="nav-icon">➕</span>Novo Frete
    </a>
    <a href="#" data-view="perfil" onclick="trocarView('perfil',this);return false;">
      <span class="nav-icon">👤</span>Perfil
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <div class="modal-overlay" id="modalOverlay" onclick="fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Detalhes</h3>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, doc, getDoc, setDoc, addDoc,
      query, where, orderBy, onSnapshot, updateDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUXluCv1WiVG4l9-VfO-MuEmKdQombQuE",
      authDomain: "fretex-b6a66.firebaseapp.com",
      projectId: "fretex-b6a66",
      storageBucket: "fretex-b6a66.firebasestorage.app",
      messagingSenderId: "311626266080",
      appId: "1:311626266080:web:0bed5cd36bba720c19e785",
      measurementId: "G-HD4H3SFX1Q"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser  = null;
    let userData     = null;
    let unsubPedidos = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { window.location.href = 'index.html'; return; }
      const data = snap.data();
      if (data.tipo === 'motorista') { window.location.href = 'motorista.html'; return; }
      if (data.tipo === 'admin')     { window.location.href = 'admin.html'; return; }
      currentUser = user;
      userData    = data;
      inicializar();
    });

    function inicializar() {
      renderizarHeader();
      trocarView('pedidos', document.querySelector('[data-view="pedidos"]'));
    }

    function renderizarHeader() {
      const header = document.getElementById('appHeader');
      const nome   = userData.nome?.split(' ')[0] || 'Cliente';
      const foto   = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(nome)}&background=F59E0B&color=111`;
      header.innerHTML = `
        <div class="logo">FRETE<span>X</span></div>
        <div class="user-pill" onclick="window._logout()">
          <img src="${foto}" alt="${nome}" />
          <span>${nome}</span>
        </div>`;
      window._logout = async () => { await signOut(auth); window.location.href = 'index.html'; };
    }

    window.trocarView = (view, el) => {
      document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
      if (el) el.classList.add('active');
      if (unsubPedidos) { unsubPedidos(); unsubPedidos = null; }
      const main = document.getElementById('mainContent');
      if (view === 'pedidos') renderViewPedidos(main);
      if (view === 'novo')    renderViewNovo(main);
      if (view === 'perfil')  renderViewPerfil(main);
    };

    // ─── VIEW: MEUS FRETES ────────────────────────────────
    function renderViewPedidos(main) {
      main.innerHTML = `
        <div class="section-label" style="margin-top:1rem">Meus Fretes</div>
        <div id="listaPedidos">
          <div class="flex-center" style="height:40vh"><div class="spinner-lg"></div></div>
        </div>`;

      const q = query(
        collection(db, 'pedidos'),
        where('clienteId', '==', currentUser.uid),
        orderBy('criadoEm', 'desc')
      );

      unsubPedidos = onSnapshot(q, (snap) => {
        const lista = document.getElementById('listaPedidos');
        if (!lista) return;
        if (snap.empty) {
          lista.innerHTML = `
            <div class="empty-state">
              <span class="icon">🚛</span>
              <p>Nenhum frete ainda.</p>
              <p class="text-muted" style="margin-top:0.5rem;font-size:0.8rem">Toque em <strong>Novo Frete</strong> para começar.</p>
            </div>`;
          return;
        }
        lista.innerHTML = snap.docs.map(d => cardPedido(d.id, d.data())).join('');
      }, (err) => {
  console.error(err);
  showToast(err.message, 'error'); // ← troca isso
     });
    }

    function cardPedido(id, p) {
      const STATUS = {
        aguardando: { label: 'Aguardando', badge: 'badge-aguardando', emoji: '⏳' },
        aceito:     { label: 'Aceito',     badge: 'badge-aceito',     emoji: '✅' },
        andamento:  { label: 'Em andamento', badge: 'badge-andamento', emoji: '🚛' },
        concluido:  { label: 'Concluído',  badge: 'badge-concluido',  emoji: '🏁' },
        cancelado:  { label: 'Cancelado',  badge: 'badge-cancelado',  emoji: '❌' }
      };
      const s    = STATUS[p.status] || STATUS.aguardando;
      const data = p.dataAgendada ? new Date(p.dataAgendada).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
      const valor = p.valor ? `R$ ${Number(p.valor).toFixed(2).replace('.',',')}` : 'Aguardando orçamento';

      return `
        <div class="pedido-card" onclick="window._verDetalhes('${id}')">
          <div class="pedido-card-header">
            <span class="badge ${s.badge}">${s.emoji} ${s.label}</span>
            <span class="pedido-valor ${p.valor ? 'has-valor' : ''}">${valor}</span>
          </div>
          <div class="pedido-rota">
            <div class="rota-item"><span class="rota-dot origem"></span><span>${p.origem}</span></div>
            <div class="rota-line"></div>
            <div class="rota-item"><span class="rota-dot destino"></span><span>${p.destino}</span></div>
          </div>
          <div class="pedido-meta">
            <span>📅 ${data}</span>
          </div>
        </div>`;
    }

    // ─── VIEW: NOVO FRETE ─────────────────────────────────
    function renderViewNovo(main) {
      main.innerHTML = `
        <div class="section-label" style="margin-top:1rem">Novo Frete</div>
        <div class="card">
          <div class="field">
            <label>Origem (endereço completo)</label>
            <input type="text" id="fOrigem" placeholder="Ex: Rua das Flores, 123 — Santos" />
          </div>
          <div class="field">
            <label>Destino (endereço completo)</label>
            <input type="text" id="fDestino" placeholder="Ex: Av. Brasil, 456 — Guarujá" />
          </div>
          <div class="field">
            <label>Data e hora desejada</label>
            <input type="datetime-local" id="fData" />
          </div>
          <div class="field">
            <label>Descrição do que vai mover</label>
            <textarea id="fDescricao" placeholder="Ex: Sofá 3 lugares, geladeira, 10 caixas, guarda-roupa 4 portas..."></textarea>
          </div>
          <button class="btn btn-primary btn-full" id="btnEnviar" onclick="window._enviarPedido()">
            📦 Solicitar Frete
          </button>
          <p class="form-hint">Após enviar, motoristas disponíveis verão seu pedido e enviarão orçamentos.</p>
        </div>`;

      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('fData').min = now.toISOString().slice(0, 16);

      window._enviarPedido = async () => {
        const origem    = document.getElementById('fOrigem').value.trim();
        const destino   = document.getElementById('fDestino').value.trim();
        const data      = document.getElementById('fData').value;
        const descricao = document.getElementById('fDescricao').value.trim();

        if (!origem || !destino || !data || !descricao) {
          showToast('Preencha todos os campos obrigatórios.', 'error'); return;
        }

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.textContent = '⏳ Enviando...';

        try {
          await addDoc(collection(db, 'pedidos'), {
            clienteId:    currentUser.uid,
            clienteNome:  userData.nome,
            motoristaId:  null,
            origem,
            destino,
            dataAgendada: data,
            descricao,
            fotos:        [],
            status:       'aguardando',
            valor:        null,
            criadoEm:     serverTimestamp()
          });

          showToast('Frete solicitado com sucesso! 🚛', 'success');
          trocarView('pedidos', document.querySelector('[data-view="pedidos"]'));
        } catch (err) {
          console.error(err);
          showToast('Erro ao enviar pedido. Tente novamente.', 'error');
          btn.disabled = false;
          btn.textContent = '📦 Solicitar Frete';
        }
      };
    }

    // ─── VIEW: PERFIL ─────────────────────────────────────
    function renderViewPerfil(main) {
      const foto = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.nome)}&background=F59E0B&color=111&size=128`;
      main.innerHTML = `
        <div class="perfil-wrap">
          <div class="perfil-avatar-wrap">
            <img src="${foto}" class="perfil-avatar" />
            <div class="perfil-badge">Cliente</div>
          </div>
          <h2 class="perfil-nome">${userData.nome}</h2>
          <p class="perfil-email">${userData.email}</p>
          <div class="card" style="width:100%;margin-top:1.5rem">
            <div class="section-label">Dados de contato</div>
            <div class="field">
              <label>Telefone / WhatsApp</label>
              <input type="tel" id="pTelefone" value="${userData.telefone || ''}" placeholder="(13) 99999-9999" />
            </div>
            <button class="btn btn-primary btn-full" onclick="window._salvarPerfil()">Salvar</button>
          </div>
          <button class="btn btn-secondary btn-full" style="margin-top:0.75rem" onclick="window._logout()">
            Sair da conta
          </button>
        </div>`;

      window._salvarPerfil = async () => {
        const tel = document.getElementById('pTelefone').value.trim();
        try {
          await setDoc(doc(db, 'users', currentUser.uid), { telefone: tel }, { merge: true });
          userData.telefone = tel;
          showToast('Perfil atualizado!', 'success');
        } catch { showToast('Erro ao salvar.', 'error'); }
      };
    }

    // ─── Modal detalhes ───────────────────────────────────
    window._verDetalhes = async (id) => {
      const snap = await getDoc(doc(db, 'pedidos', id));
      if (!snap.exists()) return;
      const p = snap.data();

      const STATUS = {
        aguardando: { label: 'Aguardando motorista', badge: 'badge-aguardando', emoji: '⏳' },
        aceito:     { label: 'Aceito pelo motorista', badge: 'badge-aceito',    emoji: '✅' },
        andamento:  { label: 'Em andamento',          badge: 'badge-andamento', emoji: '🚛' },
        concluido:  { label: 'Concluído',             badge: 'badge-concluido', emoji: '🏁' },
        cancelado:  { label: 'Cancelado',             badge: 'badge-cancelado', emoji: '❌' }
      };
      const s    = STATUS[p.status] || STATUS.aguardando;
      const data = p.dataAgendada ? new Date(p.dataAgendada).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';

      document.getElementById('modalTitle').textContent = 'Detalhes do Frete';
      document.getElementById('modalBody').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:1rem">
          <span class="badge ${s.badge}" style="align-self:flex-start">${s.emoji} ${s.label}</span>
          <div class="detail-group">
            <div class="detail-label">Origem</div>
            <div class="detail-value">📍 ${p.origem}</div>
          </div>
          <div class="detail-group">
            <div class="detail-label">Destino</div>
            <div class="detail-value">🏁 ${p.destino}</div>
          </div>
          <div class="detail-group">
            <div class="detail-label">Data agendada</div>
            <div class="detail-value">📅 ${data}</div>
          </div>
          <div class="detail-group">
            <div class="detail-label">Descrição</div>
            <div class="detail-value">${p.descricao}</div>
          </div>
          ${p.valor ? `
          <div class="detail-group">
            <div class="detail-label">Valor</div>
            <div class="detail-value text-amber fw-bold" style="font-size:1.3rem">
              R$ ${Number(p.valor).toFixed(2).replace('.',',')}
            </div>
          </div>` : `
          <div class="detail-group">
            <div class="detail-label">Valor</div>
            <div class="detail-value text-muted">Aguardando orçamento do motorista</div>
          </div>`}
          ${p.status === 'aguardando' ? `
          <button class="btn btn-danger btn-full" onclick="window._cancelarPedido('${id}')">
            ❌ Cancelar pedido
          </button>` : ''}
        </div>`;

      document.getElementById('modalOverlay').classList.add('show');
    };

    window._cancelarPedido = async (id) => {
      if (!confirm('Cancelar este pedido?')) return;
      await updateDoc(doc(db, 'pedidos', id), { status: 'cancelado' });
      fecharModal();
      showToast('Pedido cancelado.', 'info');
    };

    window.fecharModal = () => {
      document.getElementById('modalOverlay').classList.remove('show');
    };

    window.showToast = (msg, tipo = 'info') => {
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${tipo}`;
      t.innerHTML = `<span>${icons[tipo]}</span> ${msg}`;
      c.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transition = 'opacity 0.3s';
        setTimeout(() => t.remove(), 300);
      }, 3000);
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>
</body>
</html>
