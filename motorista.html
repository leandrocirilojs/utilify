<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fretex — Motorista</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body { padding-bottom: 70px; }

    .spinner-lg {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pendente-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; text-align: center;
      gap: 1rem; padding: 2rem;
    }
    .pendente-icon { font-size: 3.5rem; }
    .pendente-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .pendente-sub { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; max-width: 280px; }

    .pedido-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.3s ease both;
    }
    .pedido-card:hover { border-color: var(--border-light); transform: translateY(-2px); }
    .pedido-card:active { transform: translateY(0); }
    .pedido-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .pedido-valor { font-family: var(--font-display); font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .pedido-valor.has-valor { color: var(--amber); font-size: 1rem; }
    .pedido-rota { display: flex; flex-direction: column; gap: 4px; margin-bottom: 0.75rem; padding-left: 0.25rem; }
    .rota-item { display: flex; align-items: center; gap: 10px; font-size: 0.88rem; color: var(--text-secondary); }
    .rota-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .rota-dot.origem  { background: var(--amber); }
    .rota-dot.destino { background: var(--success); }
    .rota-line { width: 2px; height: 12px; background: var(--border-light); margin-left: 4px; }
    .pedido-meta { display: flex; gap: 1rem; font-size: 0.78rem; color: var(--text-muted); flex-wrap: wrap; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      border-top: 1px solid var(--border-light);
      width: 100%; max-height: 90dvh; overflow-y: auto;
      padding: 1.25rem; transform: translateY(20px); transition: transform 0.25s;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .modal-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: var(--surface-2); border: none; color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text-primary); }
    .detail-group { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-display); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .detail-value { font-size: 0.95rem; color: var(--text-secondary); }
    .fotos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 0.25rem; }
    .foto-grid-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border-light); }

    .valor-input-wrap { display: flex; gap: 0.5rem; align-items: stretch; }
    .valor-input-wrap input {
      flex: 1; background: var(--bg); border: 1px solid var(--border-light);
      border-radius: var(--radius-md); padding: 0.75rem 1rem;
      font-family: var(--font-body); font-size: 1rem; color: var(--text-primary);
      outline: none; transition: border-color 0.2s;
    }
    .valor-input-wrap input:focus { border-color: var(--amber); }

    .perfil-wrap { display: flex; flex-direction: column; align-items: center; padding: 2rem 0 1rem; }
    .perfil-avatar-wrap { position: relative; margin-bottom: 1rem; }
    .perfil-avatar { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 3px solid var(--amber); }
    .perfil-badge {
      position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
      background: var(--amber); color: #111; font-family: var(--font-display);
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 2px 10px; border-radius: 999px; white-space: nowrap;
    }
    .perfil-nome { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .perfil-email { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; margin-bottom: 0; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; text-align: center; }
    .stat-value { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; color: var(--amber); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    .toast-container {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; flex-direction: column; gap: 0.5rem;
      pointer-events: none; width: calc(100% - 2rem); max-width: 400px;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius-md); padding: 0.75rem 1rem; font-size: 0.9rem;
      color: var(--text-primary); box-shadow: var(--shadow-md);
      animation: toastIn 0.3s ease both; pointer-events: all;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--info); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header class="app-header" id="appHeader"></header>

<main class="main-container" id="mainContent">
  <div class="flex-center" style="height:60vh"><div class="spinner-lg"></div></div>
</main>

<nav class="bottom-nav">
  <a href="#" class="active" data-view="disponiveis" onclick="trocarView('disponiveis',this);return false;">
    <span class="nav-icon">🗺️</span>Disponíveis
  </a>
  <a href="#" data-view="meus" onclick="trocarView('meus',this);return false;">
    <span class="nav-icon">🚛</span>Meus Fretes
  </a>
  <a href="#" data-view="perfil" onclick="trocarView('perfil',this);return false;">
    <span class="nav-icon">👤</span>Perfil
  </a>
</nav>

<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="modalOverlay" onclick="fecharModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Detalhes</h3>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, doc, getDoc, setDoc,
    query, where, orderBy, onSnapshot, updateDoc, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJECT.firebaseapp.com",
    projectId: "SEU_PROJECT_ID",
    storageBucket: "SEU_PROJECT.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser  = null;
  let userData     = null;
  let unsubPedidos = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { window.location.href = 'index.html'; return; }
    const data = snap.data();
    if (data.tipo === 'cliente') { window.location.href = 'cliente.html'; return; }
    if (data.tipo === 'admin')   { window.location.href = 'admin.html';   return; }
    currentUser = user;
    userData    = data;
    inicializar();
  });

  function inicializar() {
    renderizarHeader();
    if (!userData.ativo) {
      renderPendente();
    } else {
      trocarView('disponiveis', document.querySelector('[data-view="disponiveis"]'));
    }
  }

  function renderizarHeader() {
    const header = document.getElementById('appHeader');
    const nome = userData.nome?.split(' ')[0] || 'Motorista';
    const foto = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(nome)}&background=F59E0B&color=111`;
    header.innerHTML = `
      <div class="logo">FRETE<span>X</span></div>
      <div class="user-pill" onclick="window._logout()">
        <img src="${foto}" alt="${nome}" />
        <span>${nome}</span>
      </div>`;
    window._logout = async () => { await signOut(auth); window.location.href = 'index.html'; };
  }

  function renderPendente() {
    document.getElementById('mainContent').innerHTML = `
      <div class="pendente-wrap">
        <span class="pendente-icon">⏳</span>
        <div class="pendente-title">Aguardando aprovação</div>
        <p class="pendente-sub">Seu cadastro como motorista está sendo analisado pelo administrador. Você receberá acesso em breve.</p>
        <button class="btn btn-secondary" onclick="window._logout()">Sair da conta</button>
      </div>`;
  }

  window.trocarView = (view, el) => {
    document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
    if (el) el.classList.add('active');
    if (unsubPedidos) { unsubPedidos(); unsubPedidos = null; }
    const main = document.getElementById('mainContent');
    if (view === 'disponiveis') renderDisponiveis(main);
    if (view === 'meus')        renderMeusFretes(main);
    if (view === 'perfil')      renderPerfil(main);
  };

  // ── Disponíveis ──────────────────────────────────────
  function renderDisponiveis(main) {
    main.innerHTML = `
      <div class="section-label" style="margin-top:1rem">Fretes disponíveis</div>
      <div id="listaDisponiveis">
        <div class="flex-center" style="height:40vh"><div class="spinner-lg"></div></div>
      </div>`;

    const q = query(
      collection(db, 'pedidos'),
      where('status', '==', 'aguardando'),
      orderBy('criadoEm', 'desc')
    );
    unsubPedidos = onSnapshot(q, (snap) => {
      const lista = document.getElementById('listaDisponiveis');
      if (!lista) return;
      if (snap.empty) {
        lista.innerHTML = `
          <div class="empty-state">
            <span class="icon">🗺️</span>
            <p>Nenhum frete disponível no momento.</p>
            <p class="text-muted" style="margin-top:0.5rem;font-size:0.8rem">Novos pedidos aparecerão aqui automaticamente.</p>
          </div>`;
        return;
      }
      lista.innerHTML = snap.docs.map(d => cardDisponivel(d.id, d.data())).join('');
    }, () => showToast('Erro ao carregar pedidos.', 'error'));
  }

  function cardDisponivel(id, p) {
    const data = p.dataAgendada
      ? new Date(p.dataAgendada).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      : '—';
    return `
      <div class="pedido-card" onclick="window._verDisponivel('${id}')">
        <div class="pedido-card-header">
          <span class="badge badge-aguardando">⏳ Aguardando</span>
          <span class="pedido-valor">📅 ${data}</span>
        </div>
        <div class="pedido-rota">
          <div class="rota-item"><span class="rota-dot origem"></span><span>${p.origem}</span></div>
          <div class="rota-line"></div>
          <div class="rota-item"><span class="rota-dot destino"></span><span>${p.destino}</span></div>
        </div>
        <div class="pedido-meta">
          <span>👤 ${p.clienteNome || 'Cliente'}</span>
          ${p.fotos?.length ? `<span>📷 ${p.fotos.length} foto(s)</span>` : ''}
        </div>
      </div>`;
  }

  // ── Meus Fretes ───────────────────────────────────────
  function renderMeusFretes(main) {
    main.innerHTML = `
      <div class="section-label" style="margin-top:1rem">Meus Fretes</div>
      <div id="listaMeus">
        <div class="flex-center" style="height:40vh"><div class="spinner-lg"></div></div>
      </div>`;

    const q = query(
      collection(db, 'pedidos'),
      where('motoristaId', '==', currentUser.uid),
      orderBy('criadoEm', 'desc')
    );
    unsubPedidos = onSnapshot(q, (snap) => {
      const lista = document.getElementById('listaMeus');
      if (!lista) return;
      if (snap.empty) {
        lista.innerHTML = `
          <div class="empty-state">
            <span class="icon">🚛</span>
            <p>Você ainda não aceitou nenhum frete.</p>
          </div>`;
        return;
      }
      lista.innerHTML = snap.docs.map(d => cardMeu(d.id, d.data())).join('');
    }, () => showToast('Erro ao carregar pedidos.', 'error'));
  }

  function cardMeu(id, p) {
    const STATUS = {
      aceito:    { label: 'Aceito',       badge: 'badge-aceito',    emoji: '✅' },
      andamento: { label: 'Em andamento', badge: 'badge-andamento', emoji: '🚛' },
      concluido: { label: 'Concluído',    badge: 'badge-concluido', emoji: '🏁' },
      cancelado: { label: 'Cancelado',    badge: 'badge-cancelado', emoji: '❌' },
    };
    const s = STATUS[p.status] || STATUS.aceito;
    const valor = p.valor ? `R$ ${Number(p.valor).toFixed(2).replace('.',',')}` : '—';
    return `
      <div class="pedido-card" onclick="window._verMeu('${id}')">
        <div class="pedido-card-header">
          <span class="badge ${s.badge}">${s.emoji} ${s.label}</span>
          <span class="pedido-valor ${p.valor ? 'has-valor' : ''}">${valor}</span>
        </div>
        <div class="pedido-rota">
          <div class="rota-item"><span class="rota-dot origem"></span><span>${p.origem}</span></div>
          <div class="rota-line"></div>
          <div class="rota-item"><span class="rota-dot destino"></span><span>${p.destino}</span></div>
        </div>
        <div class="pedido-meta">
          <span>👤 ${p.clienteNome || 'Cliente'}</span>
        </div>
      </div>`;
  }

  // ── Modais ────────────────────────────────────────────
  window._verDisponivel = async (id) => {
    const snap = await getDoc(doc(db, 'pedidos', id));
    if (!snap.exists()) return;
    const p = snap.data();
    if (p.status !== 'aguardando') {
      showToast('Este frete já foi aceito por outro motorista.', 'info');
      return;
    }
    const data = p.dataAgendada
      ? new Date(p.dataAgendada).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      : '—';

    document.getElementById('modalTitle').textContent = 'Aceitar frete';
    document.getElementById('modalBody').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="detail-group">
          <div class="detail-label">Origem</div>
          <div class="detail-value">📍 ${p.origem}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Destino</div>
          <div class="detail-value">🏁 ${p.destino}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Data agendada</div>
          <div class="detail-value">📅 ${data}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Descrição</div>
          <div class="detail-value">${p.descricao}</div>
        </div>
        ${p.fotos?.length ? `
          <div class="detail-group">
            <div class="detail-label">Fotos</div>
            <div class="fotos-grid">
              ${p.fotos.map(url => `<a href="${url}" target="_blank"><img src="${url}" class="foto-grid-img" /></a>`).join('')}
            </div>
          </div>` : ''}
        <div class="detail-group">
          <div class="detail-label">Seu orçamento (R$)</div>
          <div class="valor-input-wrap">
            <input type="number" id="inputValor" placeholder="Ex: 350.00" min="1" step="0.01" />
          </div>
        </div>
        <button class="btn btn-primary btn-full" id="btnAceitar" onclick="window._aceitarPedido('${id}')">
          ✅ Aceitar frete
        </button>
      </div>`;
    document.getElementById('modalOverlay').classList.add('show');
  };

  window._aceitarPedido = async (id) => {
    const valorStr = document.getElementById('inputValor').value.trim();
    const valor = parseFloat(valorStr);
    if (!valorStr || isNaN(valor) || valor <= 0) { showToast('Informe um valor válido.', 'error'); return; }
    const btn = document.getElementById('btnAceitar');
    btn.disabled = true; btn.textContent = '⏳ Aceitando...';
    try {
      await updateDoc(doc(db, 'pedidos', id), {
        motoristaId: currentUser.uid,
        motoristaNome: userData.nome,
        valor,
        status: 'aceito'
      });
      fecharModal();
      showToast('Frete aceito! 🚛', 'success');
      trocarView('meus', document.querySelector('[data-view="meus"]'));
    } catch (err) {
      console.error(err);
      showToast('Erro ao aceitar frete.', 'error');
      btn.disabled = false; btn.textContent = '✅ Aceitar frete';
    }
  };

  window._verMeu = async (id) => {
    const snap = await getDoc(doc(db, 'pedidos', id));
    if (!snap.exists()) return;
    const p = snap.data();
    const STATUS = {
      aceito:    { label: 'Aceito',       badge: 'badge-aceito',    emoji: '✅' },
      andamento: { label: 'Em andamento', badge: 'badge-andamento', emoji: '🚛' },
      concluido: { label: 'Concluído',    badge: 'badge-concluido', emoji: '🏁' },
      cancelado: { label: 'Cancelado',    badge: 'badge-cancelado', emoji: '❌' },
    };
    const s = STATUS[p.status] || STATUS.aceito;
    const data = p.dataAgendada
      ? new Date(p.dataAgendada).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      : '—';
    const valor = p.valor ? `R$ ${Number(p.valor).toFixed(2).replace('.',',')}` : '—';

    document.getElementById('modalTitle').textContent = 'Detalhes do Frete';
    document.getElementById('modalBody').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:1rem">
        <span class="badge ${s.badge}" style="align-self:flex-start">${s.emoji} ${s.label}</span>
        <div class="detail-group">
          <div class="detail-label">Origem</div>
          <div class="detail-value">📍 ${p.origem}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Destino</div>
          <div class="detail-value">🏁 ${p.destino}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Data agendada</div>
          <div class="detail-value">📅 ${data}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Descrição</div>
          <div class="detail-value">${p.descricao}</div>
        </div>
        <div class="detail-group">
          <div class="detail-label">Valor acordado</div>
          <div class="detail-value text-amber fw-bold" style="font-size:1.3rem">${valor}</div>
        </div>
        ${p.fotos?.length ? `
          <div class="detail-group">
            <div class="detail-label">Fotos</div>
            <div class="fotos-grid">
              ${p.fotos.map(url => `<a href="${url}" target="_blank"><img src="${url}" class="foto-grid-img" /></a>`).join('')}
            </div>
          </div>` : ''}
        ${p.status === 'aceito' ? `
          <button class="btn btn-success btn-full" onclick="window._atualizarStatus('${id}','andamento')">
            🚛 Iniciar frete
          </button>` : ''}
        ${p.status === 'andamento' ? `
          <button class="btn btn-primary btn-full" onclick="window._atualizarStatus('${id}','concluido')">
            🏁 Marcar como concluído
          </button>` : ''}
      </div>`;
    document.getElementById('modalOverlay').classList.add('show');
  };

  window._atualizarStatus = async (id, novoStatus) => {
    try {
      await updateDoc(doc(db, 'pedidos', id), { status: novoStatus });
      fecharModal();
      const msgs = { andamento: 'Frete iniciado! 🚛', concluido: 'Frete concluído! 🏁' };
      showToast(msgs[novoStatus] || 'Status atualizado.', 'success');
    } catch { showToast('Erro ao atualizar status.', 'error'); }
  };

  // ── Perfil ────────────────────────────────────────────
  function renderPerfil(main) {
    const foto = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.nome)}&background=F59E0B&color=111&size=128`;
    main.innerHTML = `
      <div class="perfil-wrap">
        <div class="perfil-avatar-wrap">
          <img src="${foto}" class="perfil-avatar" />
          <div class="perfil-badge">Motorista</div>
        </div>
        <h2 class="perfil-nome">${userData.nome}</h2>
        <p class="perfil-email">${userData.email}</p>

        <div class="stats-grid" style="width:100%;margin-top:1.5rem" id="statsGrid">
          <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">Concluídos</div></div>
          <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">Em andamento</div></div>
        </div>

        <div class="card" style="width:100%">
          <div class="section-label">Dados de contato</div>
          <div class="field">
            <label>Telefone / WhatsApp</label>
            <input type="tel" id="pTelefone" value="${userData.telefone || ''}" placeholder="(13) 99999-9999" />
          </div>
          <div class="field">
            <label>Tipo de veículo</label>
            <select id="pVeiculo">
              <option value="">Selecione...</option>
              <option value="Fiorino"       ${userData.veiculo === 'Fiorino'       ? 'selected' : ''}>Fiorino</option>
              <option value="Kombi/Furgão"  ${userData.veiculo === 'Kombi/Furgão'  ? 'selected' : ''}>Kombi / Furgão</option>
              <option value="Sprinter"      ${userData.veiculo === 'Sprinter'      ? 'selected' : ''}>Sprinter / Van</option>
              <option value="Caminhão 3/4"  ${userData.veiculo === 'Caminhão 3/4'  ? 'selected' : ''}>Caminhão 3/4</option>
              <option value="Caminhão Toco" ${userData.veiculo === 'Caminhão Toco' ? 'selected' : ''}>Caminhão Toco</option>
            </select>
          </div>
          <button class="btn btn-primary btn-full" onclick="window._salvarPerfil()">Salvar</button>
        </div>

        <button class="btn btn-secondary btn-full" style="margin-top:0.75rem" onclick="window._logout()">
          Sair da conta
        </button>
      </div>`;

    carregarStats();

    window._salvarPerfil = async () => {
      const tel     = document.getElementById('pTelefone').value.trim();
      const veiculo = document.getElementById('pVeiculo').value;
      try {
        await setDoc(doc(db, 'users', currentUser.uid), { telefone: tel, veiculo }, { merge: true });
        userData.telefone = tel; userData.veiculo = veiculo;
        showToast('Perfil atualizado!', 'success');
      } catch { showToast('Erro ao salvar.', 'error'); }
    };
  }

  async function carregarStats() {
    try {
      const [sConc, sAnd] = await Promise.all([
        getDocs(query(collection(db, 'pedidos'), where('motoristaId', '==', currentUser.uid), where('status', '==', 'concluido'))),
        getDocs(query(collection(db, 'pedidos'), where('motoristaId', '==', currentUser.uid), where('status', '==', 'andamento'))),
      ]);
      const grid = document.getElementById('statsGrid');
      if (grid) grid.innerHTML = `
        <div class="stat-card"><div class="stat-value">${sConc.size}</div><div class="stat-label">Concluídos</div></div>
        <div class="stat-card"><div class="stat-value">${sAnd.size}</div><div class="stat-label">Em andamento</div></div>`;
    } catch { /* silencioso */ }
  }

  window.fecharModal = () => document.getElementById('modalOverlay').classList.remove('show');

  window.showToast = (msg, tipo = 'info') => {
    const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${tipo}`;
    t.innerHTML = `<span>${icons[tipo]}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
      t.style.opacity = '0'; t.style.transition = 'opacity 0.3s';
      setTimeout(() => t.remove(), 300);
    }, 3000);
  };

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.error);
</script>
</body>
</html>
